name: Release Build

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      GO111MODULE: "on"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          cache: true

      - name: Go mod tidy
        run: go mod tidy

      - name: Install Fyne CLI
        run: go install fyne.io/fyne/v2/cmd/fyne@latest

      - name: Build Walk (amd64)
        env:
          CGO_ENABLED: "1"
          GOARCH: amd64
        run: |
          New-Item -ItemType Directory -Force -Path build | Out-Null
          go build -ldflags="-s -w -H=windowsgui" -o build/cidwalk-windows-amd64.exe ./cmd/cidwalk

      - name: Build Fyne (amd64)
        env:
          CGO_ENABLED: "1"
          GOARCH: amd64
        run: fyne package -os windows -release -id com.example.cidgio -src ./cmd/cidfyne -name cidfyne-windows-amd64

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-binaries
          path: |
            build/cidwalk-windows-amd64.exe
            *.exe

  build-linux:
    runs-on: ubuntu-latest
    env:
      GO111MODULE: "on"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          cache: true

      - name: Go mod tidy
        run: go mod tidy

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev xorg-dev libwayland-dev libxkbcommon-dev

      - name: Install Fyne CLI
        run: go install fyne.io/fyne/v2/cmd/fyne@latest

      - name: Build Fyne (amd64)
        env:
          CGO_ENABLED: "1"
          GOARCH: amd64
        run: fyne package -os linux -release -id com.example.cidgio -src ./cmd/cidfyne -name cidfyne-linux-amd64

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-binaries
          path: "*.tar.xz"

  release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Prepare Release Files
        run: |
          mkdir release
          cp windows-binaries/*.exe release/
          cp linux-binaries/*.tar.xz release/
          cp events.json release/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
